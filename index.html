  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {

      workspace.classList.add('visible');

// ============================================================
// Color quantization (Median Cut)
// ============================================================
function quantizeColors(pixels, numColors) {
  if (numColors >= pixels.length) return pixels;
  const boxes = [{ start: 0, end: pixels.length - 1 }];

  function splitBox(box) {
    const slice = pixels.slice(box.start, box.end + 1);
    const rRange = Math.max(...slice.map(p=>p[0])) - Math.min(...slice.map(p=>p[0]));
    const gRange = Math.max(...slice.map(p=>p[1])) - Math.min(...slice.map(p=>p[1]));
    const bRange = Math.max(...slice.map(p=>p[2])) - Math.min(...slice.map(p=>p[2]));

    let channel; let maxRange;
    if (rRange >= gRange && rRange >= bRange) { channel = 0; maxRange = rRange; }
    else if (gRange >= bRange) { channel = 1; maxRange = gRange; }
    else { channel = 2; maxRange = bRange; }

    if (maxRange < 5) return null;

    const sorted = [...pixels.entries()]
      .filter(([i]) => i >= box.start && i <= box.end)
      .sort((a, b) => a[1][channel] - b[1][channel])
      .map(([i]) => i);

    const mid = Math.floor(sorted.length / 2);
    const splitIdx = sorted[mid];
    if (splitIdx === box.start || splitIdx === box.end) return null;

    return [
      { start: box.start, end: splitIdx },
      { start: splitIdx + 1, end: box.end }
    ];
  }

  while (boxes.length < numColors) {
    const largest = boxes.reduce((a, b) => (a.end - a.start) > (b.end - b.start) ? a : b);
    const split = splitBox(largest);
    if (!split) break;
    const idx = boxes.indexOf(largest);
    boxes.splice(idx, 1, ...split.filter(b => b.end - b.start >= 0));
  }

  const palette = boxes.map(box => {
    const slice = pixels.slice(box.start, box.end + 1);
    const r = Math.round(slice.reduce((s,p) => s + p[0], 0) / slice.length);
    const g = Math.round(slice.reduce((s,p) => s + p[1], 0) / slice.length);
    const b = Math.round(slice.reduce((s,p) => s + p[2], 0) / slice.length);
    return [r, g, b];
  });

  return palette;
}

function findClosestColor(rgb, palette) {
  let minD = Infinity; let best = palette[0];
  for (const c of palette) {
    const d = (rgb[0]-c[0])**2 + (rgb[1]-c[1])**2 + (rgb[2]-c[2])**2;
    if (d < minD) { minD = d; best = c; if (d === 0) break; }
  }
  return best;
}

  canvas.height = px;

  tempCanvas.height = gridSize;

  let sx, sy, sw, sh;
  if (srcAspect > 1) {
    sh = sourceImage.height;
    sw = sourceImage.height;
    sx = (sourceImage.width - sw) / 2;
    sy = 0;
  } else {
    sw = sourceImage.width;
    sh = sourceImage.width;
    sx = 0;
    sy = (sourceImage.height - sh) / 2;
  }
  tempCtx.drawImage(sourceImage, sx, sy, sw, sh, 0, 0, gridSize, gridSize);
  const imageData = tempCtx.getImageData(0, 0, gridSize, gridSize);
  const data = imageData.data;

  // Step 2: extract unique pixel colors
  const pixelRGBs = [];
  for (let i = 0; i < data.length; i += 4) {
    pixelRGBs.push([data[i], data[i+1], data[i+2]]);
  }

  // Step 3: determine final palette
  let finalPalette;
  if (paletteMode === 'full') {
    if (targetColors < pixelRGBs.length) {
      finalPalette = quantizeColors(pixelRGBs, targetColors);
    } else {
      finalPalette = [...new Map(pixelRGBs.map(p => [p.join(','), p])).values()];
    }
  } else {
    const rawPalette = PALETTES[paletteMode] || PERLER_COLORS;
    // Use the palette directly, but limit to targetColors by picking well-distributed colors
    const step = Math.max(1, Math.floor(rawPalette.length / targetColors));
    finalPalette = [];
    for (let i = 0; i < targetColors && i < rawPalette.length; i++) {
      finalPalette.push(rawPalette[i * step % rawPalette.length]);
    }
    if (finalPalette.length === 0) finalPalette = [[0,0,0], [255,255,255]];
  }

  // Step 4: map each pixel to nearest palette color
  const pixelData = new Uint8ClampedArray(data.length);
  const colorCounts = new Map();
  for (let i = 0; i < data.length; i += 4) {
    const rgb = [data[i], data[i+1], data[i+2]];
    const nearest = findClosestColor(rgb, finalPalette);
    pixelData[i] = nearest[0];
    pixelData[i+1] = nearest[1];
    pixelData[i+2] = nearest[2];
    pixelData[i+3] = 255;
    const key = nearest.join(',');
    colorCounts.set(key, (colorCounts.get(key) || 0) + 1);
  }

  // Step 5: draw pixelated result
  const outCanvas = document.createElement('canvas');
  outCanvas.width = gridSize;
  outCanvas.height = gridSize;
  const outCtx = outCanvas.getContext('2d');
  const outImageData = new ImageData(pixelData, gridSize, gridSize);
  outCtx.putImageData(outImageData, 0, 0);

  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(outCanvas, 0, 0, px, px);

  // Step 6: draw grid lines
  if (gridStyle !== 'none') {
    const isDark = gridStyle === 'dark';
    ctx.strokeStyle = isDark ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= gridSize; i++) {
      const pos = i * cellSize;
      ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, px); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(px, pos); ctx.stroke();
    }
  }

  // Step 7: info display
  const maxBoardSize = 29; // standard pegboard
  const boardsNeededW = Math.ceil(gridSize / maxBoardSize);
  const boardsNeededH = Math.ceil(gridSize / maxBoardSize);
  sizeInfo.textContent = `${gridSize}×${gridSize} 像素 · 每个色块 ${cellSize}×${cellSize}px · 约需 ${boardsNeededW}×${boardsNeededH} 块标准拼豆板(29×29)`;

  // Step 8: bead info
  let paletteName = 'Perler';
  if (paletteMode === 'artkal') paletteName = 'Artkal';
  else if (paletteMode === 'dmc') paletteName = 'DMC';
  else if (paletteMode === 'full') paletteName = '自动调色';
  const usedColors = colorCounts.size;
  beadInfo.innerHTML = `
    <span>📐 色板：${paletteName}</span>
    <span>🎨 使用 ${usedColors} 种颜色</span>
    <span>🧩 拼豆数：${gridSize * gridSize} 颗</span>
    <span>📏 5mm豆成品约 ${(gridSize * 5 / 10).toFixed(1)}×${(gridSize * 5 / 10).toFixed(1)} cm</span>
    <span>📏 2.6mm迷你豆约 ${(gridSize * 2.6 / 10).toFixed(1)}×${(gridSize * 2.6 / 10).toFixed(1)} cm</span>
  `;

  // Step 9: color legend
  const sorted = [...colorCounts.entries()].sort((a, b) => b[1] - a[1]);
  if (sorted.length > 0) {
    legendSection.style.display = 'block';
    legendGrid.innerHTML = sorted.map(([key, count]) => {
      const [r,g,b] = key.split(',').map(Number);
      const rgbStr = `rgb(${r},${g},${b})`;
      return `<div class="legend-item"><div class="legend-swatch" style="background:${rgbStr}"></div>${rgbStr} × ${count}</div>`;
    }).join('');
  } else {
    legendSection.style.display = 'none';
  }
}

// Download HD image with labels
// ============================================================
downloadBtn.addEventListener('click', () => {
  if (!sourceImage || !workspace.classList.contains('visible')) return;
  const gridSize = parseInt(pixelSizeSelect.value);
  const cellSize = Math.floor(400 / gridSize);
  const px = cellSize * gridSize;

  // Create high-res export canvas
  const exportCanvas = document.createElement('canvas');
  const scale = 2; // 2x for print quality
  const margin = 30 * scale;
  const labelHeight = 50 * scale;
  const exportW = px * scale + margin * 2;
  const exportH = px * scale + margin * 2 + labelHeight;
  exportCanvas.width = exportW;
  exportCanvas.height = exportH;
  const ectx = exportCanvas.getContext('2d');

  // Background
  ectx.fillStyle = '#ffffff';
  ectx.fillRect(0, 0, exportW, exportH);

  // Title
  ectx.fillStyle = '#2d2a24';
  ectx.font = `bold ${18 * scale}px -apple-system, sans-serif`;
  ectx.textAlign = 'center';
  ectx.fillText('🧩 拼豆图纸 · Pixel Bead Pattern', exportW / 2, margin + 14 * scale);

  // Subtitle
  ectx.fillStyle = '#7a6e5e';
  ectx.font = `${11 * scale}px -apple-system, sans-serif`;
  ectx.fillText(`${gridSize}×${gridSize}  |  5mm豆约 ${(gridSize * 5 / 10).toFixed(1)}×${(gridSize * 5 / 10).toFixed(1)} cm  |  2.6mm迷你豆约 ${(gridSize * 2.6 / 10).toFixed(1)}×${(gridSize * 2.6 / 10).toFixed(1)} cm`, exportW / 2, margin + 30 * scale);

  // Draw the pixel art
  ectx.imageSmoothingEnabled = false;
  ectx.drawImage(pixelCanvas, 0, 0, px, px, margin, margin + labelHeight, px * scale, px * scale);

  // Scale ruler at bottom
  const rulerY = margin + labelHeight + px * scale + 4 * scale;
  ectx.strokeStyle = '#999';
  ectx.lineWidth = 1 * scale;
  const rulerLen = 100 * scale;
  const rulerX = margin;
  ectx.beginPath();
  ectx.moveTo(rulerX, rulerY); ectx.lineTo(rulerX + rulerLen, rulerY);
  ectx.moveTo(rulerX, rulerY - 3 * scale); ectx.lineTo(rulerX, rulerY + 3 * scale);
  ectx.moveTo(rulerX + rulerLen, rulerY - 3 * scale); ectx.lineTo(rulerX + rulerLen, rulerY + 3 * scale);
  ectx.stroke();
  ectx.fillStyle = '#999';
  ectx.font = `${9 * scale}px -apple-system, sans-serif`;
  ectx.textAlign = 'center';
  ectx.fillText('10 cm (5mm豆约20格)', rulerX + rulerLen / 2, rulerY + 14 * scale);

  // Export
  const link = document.createElement('a');
  link.download = `pixel-bead-pattern-${gridSize}x${gridSize}.png`;
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
});
